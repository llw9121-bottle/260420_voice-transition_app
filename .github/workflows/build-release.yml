# GitHub Actions 自动构建发布
# 当推送 git 标签 v* (例如 v1.0.0) 时，自动构建 Windows 和 macOS 的安装包
# 构建完成自动上传到 GitHub Release

name: Build Release

# 触发条件：推送 v 开头的标签
on:
  push:
    tags:
      - 'v*'

# 权限配置
permissions:
  contents: write  # 需要写权限来上传 Release 资产

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          choco install upx -y
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller app.spec --upx-dir="C:\ProgramData\chocolatey\bin"

      - name: Zip output
        run: |
          Compress-Archive -Path dist\* -DestinationPath VoiceTranscription-Windows.zip

      - name: Upload artifact
        uses: softprops/action-gh-release@v1
        with:
          files: VoiceTranscription-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS (universal2)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          brew install portaudio upx

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # pyaudio 需要 portaudio 已经安装才能编译
          pip install pyaudio
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller app-mac.spec

      - name: Zip output
        run: |
          cd dist
          zip -r ../VoiceTranscription-macOS.zip VoiceTranscription.app

      - name: Upload artifact
        uses: softprops/action-gh-release@v1
        with:
          files: VoiceTranscription-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
